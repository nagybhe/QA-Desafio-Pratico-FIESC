version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cafeteria_postgres
    environment:
      POSTGRES_DB: cafeteria
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - ./database/migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cafeteria_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cafeteria"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cafeteria_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cafeteria
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cafeteria_network

  frontend:
    build: ./frontend
    container_name: cafeteria_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - cafeteria_network

networks:
  cafeteria_network:
    driver: bridge

volumes:
  postgres_data: