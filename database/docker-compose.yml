version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cafeteria_postgres
    environment:
      POSTGRES_DB: cafeteria
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cafeteria_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cafeteria_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cafeteria.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - cafeteria_network
    restart: unless-stopped
    depends_on:
      - postgres

networks:
  cafeteria_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: